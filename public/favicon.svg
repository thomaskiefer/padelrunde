<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D3557" />
      <stop offset="100%" stop-color="#0F1D30" />
    </linearGradient>

    <!-- Mask to punch transparent holes through the racket head and bridge -->
    <mask id="cutouts">
      <rect x="0" y="0" width="128" height="128" fill="white" />
      <g transform="translate(64, 64) rotate(45) translate(-64, -64)">
        <!-- Throat cutout -->
        <polygon points="64,86 54,74 74,74" fill="black" />
        <!-- Head holes -->
        <circle cx="64" cy="42" r="4.5" fill="black" />
        <circle cx="52" cy="30" r="4.5" fill="black" />
        <circle cx="76" cy="30" r="4.5" fill="black" />
        <circle cx="54" cy="54" r="4.5" fill="black" />
        <circle cx="74" cy="54" r="4.5" fill="black" />
      </g>
    </mask>
  </defs>

  <!-- App Icon Base -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" />

  <!-- The Racket -->
  <g mask="url(#cutouts)">
    <g transform="translate(64, 64) rotate(45) translate(-64, -64)">
      
      <!-- Bridge Base -->
      <path d="M 48 74 L 80 74 L 72 90 L 56 90 Z" fill="#FFFFFF" />

      <!-- Handle Base -->
      <rect x="56" y="86" width="16" height="32" rx="2" fill="#FFFFFF" />
      
      <!-- Grip Wraps (Navy lines) -->
      <path d="M 54 94 L 74 88" stroke="#1D3557" stroke-width="3" />
      <path d="M 54 102 L 74 96" stroke="#1D3557" stroke-width="3" />
      <path d="M 54 110 L 74 104" stroke="#1D3557" stroke-width="3" />

      <!-- End cap -->
      <rect x="52" y="116" width="24" height="6" rx="3" fill="#E63946" stroke="#FFFFFF" stroke-width="2" />

      <!-- Head (Teal with thick white outline) -->
      <path d="M 64 16 C 20 16, 28 66, 46 76 C 54 82, 74 82, 82 76 C 100 66, 108 16, 64 16 Z" fill="#2A9D8F" stroke="#FFFFFF" stroke-width="6" />

    </g>
  </g>

  <!-- Padel Ball -->
  <circle cx="34" cy="34" r="16" fill="#E63946" stroke="#FFFFFF" stroke-width="4" />
  
  <!-- Ball inner tennis line detail -->
  <path d="M 20 34 C 26 42, 42 42, 48 34" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Action streaks for the ball -->
  <path d="M 12 56 L 22 46" stroke="#E63946" stroke-width="6" stroke-linecap="round" />
  <path d="M 24 64 L 30 58" stroke="#E63946" stroke-width="4" stroke-linecap="round" />
  <circle cx="16" cy="42" r="2.5" fill="#E63946" />

</svg>