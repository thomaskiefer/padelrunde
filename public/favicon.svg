<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <mask id="racket-holes">
      <rect x="0" y="0" width="64" height="64" fill="white" />
      <circle cx="24" cy="24" r="2" fill="black" />
      <circle cx="17" cy="17" r="2" fill="black" />
      <circle cx="31" cy="17" r="2" fill="black" />
      <circle cx="17" cy="31" r="2" fill="black" />
      <circle cx="31" cy="31" r="2" fill="black" />
    </mask>
  </defs>

  <g mask="url(#racket-holes)">
    <!-- Handle -->
    <line x1="32" y1="32" x2="54" y2="54" stroke="#1D3557" stroke-width="10" stroke-linecap="round" />
    <!-- Racket Base -->
    <circle cx="24" cy="24" r="18" fill="#1D3557" />
    <!-- Racket Face -->
    <circle cx="24" cy="24" r="14" fill="#2A9D8F" />
  </g>

  <!-- Grip tape lines -->
  <line x1="40" y1="44" x2="44" y2="40" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" />
  <line x1="46" y1="50" x2="50" y2="46" stroke="#FAFAF9" stroke-width="2.5" stroke-linecap="round" />

  <!-- Handle End Cap -->
  <circle cx="55" cy="55" r="5" fill="#E63946" />

  <!-- Padel Ball -->
  <circle cx="48" cy="12" r="5" fill="#E63946" />

  <!-- Motion Lines -->
  <path d="M58 4 L53 9" stroke="#E63946" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M55 1 L50 6" stroke="#E63946" stroke-width="2" stroke-linecap="round" opacity="0.8" />
</svg>